# =============================================================================
# terraform-ci.yml — Terraform CI Pipeline (lint, validate, security scan)
# =============================================================================
# Runs on push/PR to main when terraform/ files change.  No Azure credentials
# are required — this pipeline only lints, validates, and scans HCL code.
# =============================================================================

name: "Terraform CI"

on:
  push:
    branches: [main]
    paths: ["terraform/**"]
  pull_request:
    branches: [main]
    paths: ["terraform/**"]

env:
  TF_VAR_location: "eastus"
  TF_VAR_prefix: "labci"
  TF_VAR_resource_group_name: "rg-ci-validation"
  TF_VAR_admin_username: "ciuser"
  TF_VAR_admin_ssh_public_key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC0 ci@validation"
  TF_VAR_budget_alert_email: "ci@example.com"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-ci:
    name: "Lint → Validate → Security Scan"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Terraform Setup ───────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # ── Format Check ──────────────────────────────────────────────────
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -diff
        continue-on-error: false

      # ── Initialize ────────────────────────────────────────────────────
      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      # ── Validate ──────────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── tfsec Security Scan ────────────────────────────────────────────
      - name: tfsec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform
          soft_fail: false

      # ── Checkov Security Scan ──────────────────────────────────────────
      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: false
          output_format: cli

      # ── PR Comment (on success) ────────────────────────────────────────
      - name: Comment on PR — Success
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## ✅ Terraform CI Passed

            | Step | Status |
            |------|--------|
            | 🖊️ Format | \`${{ steps.fmt.outcome }}\` |
            | ⚙️ Init | \`${{ steps.init.outcome }}\` |
            | ✔️ Validate | \`${{ steps.validate.outcome }}\` |
            | 🔒 tfsec | \`passed\` |
            | 🛡️ Checkov | \`passed\` |

            *All Terraform checks passed. Ready for review.*

            > Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      # ── PR Comment (on failure) ────────────────────────────────────────
      - name: Comment on PR — Failure
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## ❌ Terraform CI Failed

            | Step | Status |
            |------|--------|
            | 🖊️ Format | \`${{ steps.fmt.outcome }}\` |
            | ⚙️ Init | \`${{ steps.init.outcome }}\` |
            | ✔️ Validate | \`${{ steps.validate.outcome }}\` |

            *One or more checks failed. Please review the logs above.*

            > Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
